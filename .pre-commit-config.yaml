# Pre-commit hooks for FreeAgentics
# See https://pre-commit.com for more information
#
# To install: pre-commit install
# To run against all files: pre-commit run --all-files

# To update hooks: pre-commit autoupdate

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2048"] # 2MB
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Python formatting and linting with Ruff and Black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix, --show-fixes]
      - id: ruff-format

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.13

  # TypeScript/JavaScript formatting and linting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, tsx, json, yaml, markdown]
        exclude: ^(\.next/|node_modules/|build/|dist/)

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.6.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        types: [file]
        additional_dependencies:
          - eslint@9.6.0
          - eslint-config-next@14.2.5 # Use a specific version

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        # The 'files' entry is necessary to make mypy check all files
        # instead of just the ones passed by pre-commit.
        files: .
        additional_dependencies: []
        args: [--ignore-missing-imports, --scripts-are-modules]

  # Security checks
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-ll", "-s", "B101,B404,B603,B607"] # Skip assert, import-subprocess, etc.
        exclude: "tests/*"

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ["--fix", "--config", ".markdownlint.json"]
