name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt || pip install pytest pytest-cov pytest-asyncio httpx
    
    - name: Run linting
      working-directory: ./backend
      run: |
        pip install flake8 black isort
        # Check code formatting
        black --check app tests
        # Check import sorting
        isort --check-only app tests
        # Run flake8 linting
        flake8 app tests --max-line-length=120 --extend-ignore=E203,W503
    
    - name: Run type checking
      working-directory: ./backend
      run: |
        pip install mypy
        mypy app --ignore-missing-imports || true
    
    - name: Run unit tests
      working-directory: ./backend
      run: |
        pytest tests/ -v -m "unit" --cov=app --cov-report=xml --cov-report=html
    
    - name: Run integration tests
      working-directory: ./backend
      run: |
        pytest tests/ -v -m "integration" --cov=app --cov-append --cov-report=xml --cov-report=html
    
    - name: Run all tests
      working-directory: ./backend
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: Backend Coverage
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: backend/htmlcov/
    
    - name: Check test coverage
      working-directory: ./backend
      run: |
        coverage report --fail-under=80 || echo "Coverage is below 80%"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: cogniticnet-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker run --rm cogniticnet-backend:test python -c "import app; print('Backend imports successfully')" 