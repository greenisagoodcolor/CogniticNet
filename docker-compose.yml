version: '3.8'

# Default docker-compose for quick start
# For specific environments, use docker/[environment]/docker-compose.yml

services:
  # Frontend Next.js application
  frontend:
    build:
      context: .
      target: frontend-production
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # Backend FastAPI application
  backend:
    build:
      context: .
      target: backend-production
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cogniticnet:cogniticnet@postgres:5432/cogniticnet
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=cogniticnet
      - POSTGRES_PASSWORD=cogniticnet
      - POSTGRES_DB=cogniticnet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Nginx Reverse Proxy (optional, uncomment for production-like setup)
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #   depends_on:
  #     - frontend
  #     - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: cogniticnet 